s<!DOCTYPE html>
<html>
<head>
    <title>EchoSync Diagnostic</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
        }
        .test {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #333;
            background: #0a0a0a;
        }
        .pass { color: #00ff00; }
        .fail { color: #ff0000; }
        .pending { color: #ffaa00; }
        button {
            background: #333;
            color: #fff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #555; }
    </style>
</head>
<body>
    <h1>EchoSync Backend Diagnostic</h1>
    
    <div class="test">
        <h3>Test 1: HTTP Health Check</h3>
        <div id="test1" class="pending">Testing...</div>
    </div>
    
    <div class="test">
        <h3>Test 2: WebSocket Connection</h3>
        <div id="test2" class="pending">Testing...</div>
    </div>
    
    <div class="test">
        <h3>Test 3: Fetch Tasks Endpoint</h3>
        <div id="test3" class="pending">Testing...</div>
    </div>
    
    <div class="test">
        <h3>Console Logs</h3>
        <div id="logs" style="max-height: 300px; overflow-y: auto;"></div>
    </div>
    
    <button onclick="runTests()">Run Tests Again</button>

    <script>
        const API_BASE = 'http://127.0.0.1:8765';
        
        function log(msg, isError = false) {
            const logsDiv = document.getElementById('logs');
            const line = document.createElement('div');
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            line.style.color = isError ? '#ff0000' : '#00ff00';
            logsDiv.appendChild(line);
            logsDiv.scrollTop = logsDiv.scrollHeight;
            console.log(msg);
        }
        
        async function test1() {
            const el = document.getElementById('test1');
            try {
                log('Test 1: Fetching /health...');
                const res = await fetch(`${API_BASE}/health`);
                const data = await res.json();
                if (data.status === 'ok') {
                    el.innerHTML = '<span class="pass">✓ PASS: Backend is healthy</span>';
                    log('Test 1: PASS - Backend responded with status OK');
                    return true;
                } else {
                    el.innerHTML = '<span class="fail">✗ FAIL: Unexpected response: ' + JSON.stringify(data) + '</span>';
                    log('Test 1: FAIL - Unexpected response', true);
                    return false;
                }
            } catch (err) {
                el.innerHTML = '<span class="fail">✗ FAIL: ' + err.message + '</span>';
                log('Test 1: FAIL - ' + err.message, true);
                return false;
            }
        }
        
        async function test2() {
            const el = document.getElementById('test2');
            return new Promise((resolve) => {
                try {
                    log('Test 2: Connecting to WebSocket...');
                    const ws = new WebSocket('ws://127.0.0.1:8765/ws/status');
                    
                    const timeout = setTimeout(() => {
                        ws.close();
                        el.innerHTML = '<span class="fail">✗ FAIL: WebSocket connection timeout</span>';
                        log('Test 2: FAIL - Connection timeout', true);
                        resolve(false);
                    }, 5000);
                    
                    ws.onopen = () => {
                        clearTimeout(timeout);
                        el.innerHTML = '<span class="pass">✓ PASS: WebSocket connected</span>';
                        log('Test 2: PASS - WebSocket connected successfully');
                        ws.close();
                        resolve(true);
                    };
                    
                    ws.onerror = (err) => {
                        clearTimeout(timeout);
                        el.innerHTML = '<span class="fail">✗ FAIL: WebSocket error - ' + err.message + '</span>';
                        log('Test 2: FAIL - WebSocket error: ' + err.message, true);
                        resolve(false);
                    };
                    
                    ws.onclose = (event) => {
                        if (!event.wasClean) {
                            log('Test 2: WebSocket closed unexpectedly - Code: ' + event.code, true);
                        }
                    };
                } catch (err) {
                    el.innerHTML = '<span class="fail">✗ FAIL: ' + err.message + '</span>';
                    log('Test 2: FAIL - Exception: ' + err.message, true);
                    resolve(false);
                }
            });
        }
        
        async function test3() {
            const el = document.getElementById('test3');
            try {
                log('Test 3: Fetching /tasks...');
                const res = await fetch(`${API_BASE}/tasks`);
                const data = await res.json();
                el.innerHTML = '<span class="pass">✓ PASS: Tasks endpoint works (returned ' + data.length + ' tasks)</span>';
                log('Test 3: PASS - Tasks endpoint returned ' + data.length + ' tasks');
                return true;
            } catch (err) {
                el.innerHTML = '<span class="fail">✗ FAIL: ' + err.message + '</span>';
                log('Test 3: FAIL - ' + err.message, true);
                return false;
            }
        }
        
        async function runTests() {
            document.getElementById('logs').innerHTML = '';
            log('=== Starting diagnostic tests ===');
            log('Browser: ' + navigator.userAgent);
            log('Page URL: ' + window.location.href);
            
            await test1();
            await new Promise(r => setTimeout(r, 500));
            await test2();
            await new Promise(r => setTimeout(r, 500));
            await test3();
            
            log('=== Tests complete ===');
        }
        
        // Run tests on load
        window.onload = runTests;
    </script>
</body>
</html>
